version: '3.8'

services:
  # MongoDB Database
  canusa-mongodb:
    image: mongo:6.0
    container_name: canusa-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: CanusaNexus2024!
    volumes:
      - mongodb_data:/data/db
    networks:
      - canusa-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  canusa-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: canusa-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MONGO_URL=${MONGO_URL}
      - DB_NAME=${DB_NAME}
      - DEFAULT_ADMIN_EMAIL=${DEFAULT_ADMIN_EMAIL}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD}
      - DEFAULT_ADMIN_NAME=${DEFAULT_ADMIN_NAME}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_SENDER_NAME=${SMTP_SENDER_NAME}
      - APP_URL=${APP_URL}
    depends_on:
      canusa-mongodb:
        condition: service_healthy
    networks:
      - canusa-network
    ports:
      - "8001:8001"

  # Frontend
  canusa-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL}
    container_name: canusa-frontend
    restart: unless-stopped
    networks:
      - canusa-network
    ports:
      - "3000:80"

  # Nginx Reverse Proxy (optional - falls Sie keinen separaten haben)
  canusa-nginx:
    image: nginx:alpine
    container_name: canusa-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - canusa-backend
      - canusa-frontend
    networks:
      - canusa-network

volumes:
  mongodb_data:
    driver: local

networks:
  canusa-network:
    driver: bridge
